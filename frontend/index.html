<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>配信者登録 (MVP)</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 24px auto; padding: 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    input, select, button { padding: 8px; margin: 4px 0; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    ul { padding-left: 18px; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>配信者登録画面（最小）</h1>
  <p class="muted">API Base: <code id="apiBaseText"></code></p>

  <div class="card">
    <h2>配信者を追加</h2>
    <div class="row">
      <input id="displayName" placeholder="表示名 (例: しおたに)" size="28" />
      <select id="platform">
        <option value="youtube">youtube</option>
        <option value="twitch">twitch</option>
        <option value="x">x</option>
      </select>
      <input id="externalId" placeholder="external_id (channel/user id)" size="28" />
      <button id="addBtn">登録</button>
    </div>
    <p id="addResult" class="muted"></p>
  </div>

  <div class="card">
    <h2>登録済み配信者</h2>
    <button id="reloadBtn">再読込</button>
    <ul id="streamerList"></ul>
  </div>

  <script>
    const API_BASE = localStorage.getItem('apiBase') || 'http://localhost:8000';
    document.getElementById('apiBaseText').textContent = API_BASE;

    async function loadStreamers() {
      const ul = document.getElementById('streamerList');
      ul.innerHTML = '読み込み中...';
      try {
        const res = await fetch(`${API_BASE}/streamers`);
        const data = await res.json();
        ul.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          ul.innerHTML = '<li>まだありません</li>';
          return;
        }
        data.forEach(s => {
          const li = document.createElement('li');
          li.textContent = `#${s.id} ${s.display_name}`;
          ul.appendChild(li);
        });
      } catch (e) {
        ul.innerHTML = `<li>取得失敗: ${e}</li>`;
      }
    }

    async function addStreamer() {
      const displayName = document.getElementById('displayName').value.trim();
      const platform = document.getElementById('platform').value;
      const externalId = document.getElementById('externalId').value.trim();
      const result = document.getElementById('addResult');

      if (!displayName || !externalId) {
        result.textContent = 'displayName と externalId は必須です';
        return;
      }

      const payload = {
        display_name: displayName,
        source_accounts: [{ platform, external_id: externalId }]
      };

      try {
        const res = await fetch(`${API_BASE}/streamers`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const body = await res.json();
        if (!res.ok) {
          result.textContent = `登録失敗: ${JSON.stringify(body)}`;
          return;
        }
        result.textContent = `登録成功: #${body.id} ${body.display_name}`;
        document.getElementById('displayName').value = '';
        document.getElementById('externalId').value = '';
        await loadStreamers();
      } catch (e) {
        result.textContent = `登録失敗: ${e}`;
      }
    }

    document.getElementById('addBtn').addEventListener('click', addStreamer);
    document.getElementById('reloadBtn').addEventListener('click', loadStreamers);
    loadStreamers();
  </script>
</body>
</html>
